<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livros do Novo Testamento</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 200px;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s, transform 0.2s;
        }
        button:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
        @media (max-width: 600px) {
            input[type="text"] {
                width: 100%;
            }
        }
    </style>
    <script>
        let livros = [];

        // Função para carregar o JSON
        async function loadBooks() {
            const response = await fetch('livros.json');
            livros = await response.json();
        }

        function searchBook() {
            const input = document.getElementById("bookSearch").value.toLowerCase();
            const foundBook = livros.find(book => book.titulo.toLowerCase() === input);
            if (foundBook) {
                window.location.href = foundBook.url;
            } else {
                alert('Livro não encontrado. Tente novamente.');
            }
        }

        // Chama a função ao carregar a página
        window.onload = loadBooks;
    </script>
</head>
<body>

    <h1>Livros do Novo Testamento</h1>

    <div class="search-bar">
        <input type="text" id="bookSearch" placeholder="Digite o nome de um livro...">
        <button onclick="searchBook()">Buscar</button>
    </div>

</body>
</html>
